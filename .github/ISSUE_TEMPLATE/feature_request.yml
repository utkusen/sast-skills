name: Feature request
description: New CLI flag, new export format, ergonomic improvement, integration with another tool.
title: "[feature] "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        If you're proposing a **new vulnerability skill**, use the "Skill proposal" template instead — it has more structure.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What can you not do today with sast-skills?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Concrete shape of the feature — CLI flag name, config file keys, expected output, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you thought about solving this. Why aren't they enough?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to prior art, related issues, or examples from other tools.
