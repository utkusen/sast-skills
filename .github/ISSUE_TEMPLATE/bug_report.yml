name: Bug report
description: CLI crash, wrong install behaviour, bad export output, skill contract breakage.
title: "[bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill the boxes below — a reproducible example is the fastest route to a fix.

        For suspected **security** issues, do NOT open this; follow [SECURITY.md](../blob/main/SECURITY.md) instead.
  - type: input
    id: version
    attributes:
      label: sast-skills version
      description: Output of `npx sast-skills --version`.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.2 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true
  - type: dropdown
    id: assistant
    attributes:
      label: Which assistant were you targeting?
      options:
        - claude
        - agents
        - all
        - n/a (CLI bug unrelated to install)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands, starting from a clean checkout or a fresh `tmp` directory.
      placeholder: |
        1. mkdir /tmp/repro && cd /tmp/repro
        2. npx sast-skills install --yes --assistant claude --scope project
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include stack traces, stderr, or screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Config, env vars, network restrictions, previously-installed CLAUDE.md, etc.
